# 每周日晚上自动：拉取最新依赖（构建时 uv sync）、构建镜像并推送到 GitHub Container Registry (GHCR)
name: Docker build and push to GHCR

on:
  schedule:
    # 周日 12:00 UTC ≈ 北京时间周日 20:00（夏令时前后会差一小时，可按需改）
    - cron: "0 12 * * 0"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Refresh lock file with latest compatible dependencies
        # 每周在构建前升级锁文件，使镜像内依赖保持较新；无需把 uv.lock 提交回仓库
        run: uv lock --upgrade

      - name: Set lowercase image name (Docker 要求小写)
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
